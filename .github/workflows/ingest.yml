name: Scheduled Ingestion

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          # Remove large pre-installed toolchains that are not needed for ingestion
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ingest.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Run ingestion
        env:
          EDS_BASE_URL: ${{ secrets.EDS_BASE_URL }}
          EDS_API_KEY: ${{ secrets.EDS_API_KEY }}
          EDS_TIMEOUT: "30"
          INGEST_LOOKBACK_HOURS: "24"
        run: |
          python -m src.ingestion.run_ingestion
